name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: windows
            goarch: amd64
            ext: .exe
          - goos: linux
            goarch: amd64
            ext: ''
          - goos: darwin
            goarch: amd64
            ext: ''
          - goos: darwin
            goarch: arm64
            ext: ''
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build
        working-directory: gitscope-wails
        run: wails build -platform ${{ matrix.goos }}/${{ matrix.goarch }} -o gitscope-wails${{ matrix.ext }}

      - name: Create artifact
        uses: actions/upload-artifact@v4
        with:
          name: gitscope-wails-${{ matrix.goos }}-${{ matrix.goarch }}
          path: gitscope-wails/build/bin/gitscope-wails${{ matrix.ext }}

  publish:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            gitscope-wails-windows-amd64/*
            gitscope-wails-linux-amd64/*
            gitscope-wails-darwin-amd64/*
            gitscope-wails-darwin-arm64/*
