name: Release

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    outputs:
      is_tag: ${{ steps.version.outputs.IS_TAG }}
      version: ${{ steps.version.outputs.VERSION }}
    strategy:
      matrix:
        include:
          - goos: windows
            goarch: amd64
            ext: .exe
            runner: windows-latest
          - goos: linux
            goarch: amd64
            ext: ''
            runner: ubuntu-latest

    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev
          # Create pkg-config symlink for webkit2gtk-4.0 -> 4.1
          if [ -f /usr/lib/x86_64-linux-gnu/pkgconfig/webkit2gtk-4.1.pc ]; then
            sudo ln -sf /usr/lib/x86_64-linux-gnu/pkgconfig/webkit2gtk-4.1.pc /usr/lib/x86_64-linux-gnu/pkgconfig/webkit2gtk-4.0.pc
          fi

      - name: Extract version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
            echo "IS_TAG=true" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
            echo "IS_TAG=false" >> $GITHUB_OUTPUT
          fi

      - name: Build binary
        working-directory: gitscope-wails
        run: wails build -clean

      - name: List build output
        shell: bash
        run: ls -la gitscope-wails/build/bin/ || echo "build/bin not found"

      - name: Package binary (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          ARCHIVE_NAME="gitscope-wails-${{ steps.version.outputs.VERSION }}-${{ matrix.goos }}-${{ matrix.goarch }}"
          BINARY=$(find gitscope-wails/build/bin -type f -name 'gitscope-wails' | head -1)
          tar czf "${ARCHIVE_NAME}.tar.gz" -C "$(dirname "$BINARY")" "$(basename "$BINARY")"
          echo "ARCHIVE=${ARCHIVE_NAME}.tar.gz" >> $GITHUB_ENV

      - name: Package binary (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          ARCHIVE_NAME="gitscope-wails-${{ steps.version.outputs.VERSION }}-${{ matrix.goos }}-${{ matrix.goarch }}"
          BINARY=$(find gitscope-wails/build/bin -type f -name 'gitscope-wails.exe' | head -1)
          cp "$BINARY" "${ARCHIVE_NAME}.exe"
          echo "ARCHIVE=${ARCHIVE_NAME}.exe" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gitscope-wails-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ${{ env.ARCHIVE }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum * > checksums-sha256.txt
          cat checksums-sha256.txt

      - name: Generate release notes
        id: notes
        if: needs.build.outputs.is_tag == 'true'
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | head -2 | tail -1)
          CURRENT_TAG="${GITHUB_REF#refs/tags/}"
          if [ -n "$PREV_TAG" ] && [ "$PREV_TAG" != "$CURRENT_TAG" ]; then
            echo "## Changes since ${PREV_TAG}" > notes.md
            echo "" >> notes.md
            git log --pretty=format:"- %s (%h)" "${PREV_TAG}..${CURRENT_TAG}" >> notes.md
          else
            echo "## Initial Release" > notes.md
          fi
          echo "" >> notes.md
          echo "" >> notes.md
          echo "## Downloads" >> notes.md
          echo "| Platform | File |" >> notes.md
          echo "|----------|------|" >> notes.md
          echo "| Windows (x64) | \`gitscope-wails-*-windows-amd64.exe\` |" >> notes.md
          echo "| Linux (x64) | \`gitscope-wails-*-linux-amd64.tar.gz\` |" >> notes.md

      - name: Create GitHub Release
        if: needs.build.outputs.is_tag == 'true'
        uses: softprops/action-gh-release@v2
        with:
          body_path: notes.md
          files: |
            artifacts/*
          generate_release_notes: true
